name: release-binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (e.g., v0.2.0)"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          BIN="checkvist-cli${{ matrix.ext }}"
          OUT="checkvist-cli-${{ inputs.tag }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$OUT" "$BIN"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          BIN="checkvist-cli${{ matrix.ext }}"
          OUT="checkvist-cli-${{ inputs.tag }}-${{ matrix.target }}.zip"
          7z a "$OUT" "target/${{ matrix.target }}/release/$BIN"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          files: |
            checkvist-cli-${{ inputs.tag }}-${{ matrix.target }}.${{ matrix.archive }}

  source:
    name: source-tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Create source tarball
        shell: bash
        run: |
          set -euo pipefail
          ROOT="checkvist-cli-${{ inputs.tag }}"
          OUT="checkvist-cli-${{ inputs.tag }}-src.tar.gz"
          git archive --format=tar --prefix="${ROOT}/" ${{ inputs.tag }} | gzip -9 > "$OUT"

      - name: Upload source tarball
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          files: |
            checkvist-cli-${{ inputs.tag }}-src.tar.gz
